<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Internal CAD Portal Login - Dark Mode (Minimalist)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#ffffff",
              "on-tertiary-fixed-variant": "#6d28d9",
              "secondary-fixed": "#f1f5f9",
              "surface-container-low": "#f8f9fc",
              "secondary": "#475569",
              "on-primary-container": "#1e40af",
              "surface": "#ffffff",
              "primary-container": "#dbeafe",
              "on-error": "#ffffff",
              "surface-bright": "#ffffff",
              "on-primary-fixed": "#1e3a8a",
              "inverse-on-surface": "#f1f5f9",
              "on-tertiary-fixed": "#2e1065",
              "background": "#0f172a", /* Overridden for dark mode focus */
              "surface-container-highest": "#dee3f0",
              "on-primary-fixed-variant": "#1d4ed8",
              "surface-dim": "#f6f6f8",
              "on-surface": "#f1f5f9", /* Dark mode contrast */
              "on-secondary": "#ffffff",
              "on-error-container": "#991b1b",
              "surface-tint": "#2b6cee",
              "inverse-surface": "#1e293b",
              "secondary-fixed-dim": "#e2e8f0",
              "secondary-container": "#1e293b",
              "tertiary-fixed-dim": "#ede9fe",
              "on-background": "#f1f5f9",
              "surface-container-high": "#1e293b",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed-variant": "#334155",
              "on-surface-variant": "#94a3b8",
              "tertiary-container": "#ede9fe",
              "tertiary-fixed": "#f5f3ff",
              "primary": "#2b6cee",
              "surface-variant": "#1e293b",
              "error-container": "#fee2e2",
              "error": "#ef4444",
              "surface-container": "#0f172a",
              "tertiary": "#7c3aed",
              "outline-variant": "#334155",
              "primary-fixed-dim": "#bfdbfe",
              "inverse-primary": "#93c5fd",
              "outline": "#475569",
              "on-tertiary-container": "#5b21b6",
              "surface-container-lowest": "#020617",
              "primary-fixed": "#dbeafe",
              "on-secondary-container": "#f1f5f9",
              "on-secondary-fixed": "#0f172a"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            background-image: radial-gradient(circle at 2px 2px, #1e293b 1px, transparent 0);
            background-size: 40px 40px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">
<!-- Top Navigation (Suppressed per Rules: Transactional Screen, but maintaining brand presence) -->
<header class="fixed top-0 w-full flex justify-center py-8">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-sm" data-icon="architecture">architecture</span>
</div>
<span class="text-lg font-bold tracking-tighter text-on-surface">Blueprint CAD</span>
</div>
</header>
<!-- Main Login Canvas -->
<main class="w-full max-w-md">
<div class="bg-surface-container-lowest border border-outline-variant p-8 rounded-xl shadow-2xl relative overflow-hidden">
<!-- Subtle accent top line -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary"></div>
<!-- Form Header -->
<div class="mb-8 space-y-1">
<h1 class="text-xl font-bold tracking-tight text-on-surface">Internal CAD Portal Login</h1>
<p class="text-sm text-on-surface-variant">Engineering &amp; Design Authentication</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6">
<!-- Employee ID Field -->
<div class="space-y-2">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant block" for="employee-id">
                        Employee ID
                    </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant text-lg" data-icon="badge">badge</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-surface-variant border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-lg text-sm text-on-surface placeholder:text-on-surface-variant/50 transition-all outline-none" id="employee-id" name="employee-id" placeholder="E-000000" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant block" for="password">
                            Password
                        </label>
<a class="text-[10px] text-primary hover:underline font-medium" href="#">Reset Credentials</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant text-lg" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-surface-variant border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-lg text-sm text-on-surface placeholder:text-on-surface-variant/50 transition-all outline-none" id="password" name="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary py-3 rounded-lg font-semibold text-sm transition-all active:scale-[0.98] shadow-lg shadow-primary/20" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow h-[1px] bg-outline-variant"></div>
<span class="px-4 text-[10px] uppercase tracking-widest text-on-surface-variant font-medium">OR</span>
<div class="flex-grow h-[1px] bg-outline-variant"></div>
</div>
<!-- SSO Action -->
<button class="w-full border border-outline-variant hover:bg-surface-variant text-on-surface py-2.5 rounded-lg font-medium text-sm transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="corporate_fare">corporate_fare</span>
                Employee SSO
            </button>
</div>
<!-- Footer Help Link -->
<p class="mt-8 text-center text-on-surface-variant text-xs font-medium">
            System Status: <span class="text-emerald-500">Operational</span> • <a class="hover:text-primary transition-colors" href="#">Technical Support</a>
</p>
</main>
<!-- Shared Component: Footer (Applied per hierarchy, adapted for focused login screen) -->
<footer class="w-full py-8 mt-auto border-t border-outline-variant bg-surface-container-lowest">
<div class="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto gap-4">
<span class="text-[10px] uppercase tracking-widest font-medium text-on-surface-variant">© 2024 Blueprint Precision Engineering. All rights reserved.</span>
<div class="flex gap-6">
<a class="text-[10px] uppercase tracking-widest font-medium text-on-surface-variant hover:text-on-surface transition-all" href="#">Privacy Policy</a>
<a class="text-[10px] uppercase tracking-widest font-medium text-on-surface-variant hover:text-on-surface transition-all" href="#">Terms of Service</a>
<a class="text-[10px] uppercase tracking-widest font-medium text-on-surface-variant hover:text-on-surface transition-all" href="#">Security Architecture</a>
</div>
</div>
</footer>
</body></html>
