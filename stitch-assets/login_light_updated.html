<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Blueprint CAD</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-container": "#1e293b",
              "inverse-surface": "#1e293b",
              "primary-fixed-dim": "#bfdbfe",
              "surface-tint": "#2b6cee",
              "inverse-on-surface": "#f1f5f9",
              "surface-variant": "#f1f5f9",
              "surface-container": "#f1f3f9",
              "secondary-fixed-dim": "#e2e8f0",
              "on-secondary": "#ffffff",
              "surface": "#ffffff",
              "secondary-container": "#f1f5f9",
              "on-error-container": "#991b1b",
              "surface-dim": "#f6f6f8",
              "error": "#ef4444",
              "primary-fixed": "#dbeafe",
              "surface-container-highest": "#dee3f0",
              "on-tertiary-container": "#5b21b6",
              "on-primary-fixed": "#1e3a8a",
              "tertiary-fixed": "#f5f3ff",
              "on-background": "#0f172a",
              "surface-container-high": "#e9edf5",
              "on-tertiary-fixed": "#2e1065",
              "on-secondary-fixed": "#0f172a",
              "on-primary": "#ffffff",
              "outline-variant": "#e2e8f0",
              "outline": "#cbd5e1",
              "on-secondary-fixed-variant": "#334155",
              "secondary-fixed": "#f1f5f9",
              "primary-container": "#dbeafe",
              "primary": "#2b6cee",
              "secondary": "#475569",
              "surface-container-low": "#f8f9fc",
              "on-surface": "#0f172a",
              "surface-container-lowest": "#ffffff",
              "background": "#f6f6f8",
              "tertiary": "#7c3aed",
              "error-container": "#fee2e2",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#ede9fe",
              "surface-bright": "#ffffff",
              "on-primary-fixed-variant": "#1d4ed8",
              "on-primary-container": "#1e40af",
              "on-error": "#ffffff",
              "on-tertiary-fixed-variant": "#6d28d9",
              "on-surface-variant": "#64748b",
              "inverse-primary": "#93c5fd",
              "tertiary-fixed-dim": "#ede9fe"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopNavBar: Execution of Shared Component JSON -->
<nav class="bg-white dark:bg-slate-950 flex justify-between items-center w-full px-6 py-3 max-w-full mx-auto border-b border-slate-200 dark:border-slate-800 font-sans text-sm font-medium tracking-tight">
<div class="text-xl font-bold tracking-tighter text-blue-600 dark:text-blue-400">
            Blueprint CAD
        </div>
<!-- Navigation Suppressed for Login State per Shell Visibility Rule -->
<div class="hidden md:flex gap-8">
<!-- Navigation links are hidden during focused login journey -->
</div>
<div class="flex items-center gap-4 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-900 p-2 rounded-lg transition-all" data-icon="help">help</span>
<span class="material-symbols-outlined cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-900 p-2 rounded-lg transition-all" data-icon="settings">settings</span>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-[400px] space-y-8">
<!-- Minimalist Login Card -->
<div class="bg-surface rounded-xl p-8 border border-outline-variant shadow-sm transition-all">
<div class="mb-8 text-center md:text-left">
<h1 class="text-[1.25rem] font-bold text-on-surface tracking-tight mb-2">Technical Portal Access</h1>
<p class="text-[0.875rem] text-on-surface-variant font-medium">Internal Engineering Environment</p>
</div>
<form class="space-y-5">
<div class="space-y-2">
<label class="text-[10px] uppercase tracking-widest font-semibold text-slate-500" for="email">Email Address</label>
<div class="relative group">
<input class="w-full h-11 bg-surface-container-low border border-outline rounded-lg px-4 text-[0.875rem] placeholder:text-outline focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all" id="email" placeholder="engineer@blueprint.cad" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-[10px] uppercase tracking-widest font-semibold text-slate-500" for="password">Password</label>
<a class="text-[10px] uppercase tracking-widest font-semibold text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full h-11 bg-surface-container-low border border-outline rounded-lg px-4 text-[0.875rem] placeholder:text-outline focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full h-11 bg-primary text-on-primary font-semibold rounded-lg text-[0.875rem] hover:opacity-90 active:opacity-80 transition-all shadow-sm" type="submit">
                            Sign In
                        </button>
</div>
</form>
</div>
<!-- Footer Link -->
<div class="text-center">
<p class="text-[0.875rem] text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline transition-all" href="#">Sign Up</a>
</p>
</div>
</div>
</main>
<!-- Footer: Execution of Shared Component JSON -->
<footer class="bg-slate-50 dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex flex-col md:flex-row justify-between items-center w-full px-8 py-6 mt-auto">
<div class="text-[10px] uppercase tracking-widest font-semibold text-slate-500 dark:text-slate-400 mb-4 md:mb-0">
            © 2024 Blueprint Precision Engineering
        </div>
<div class="flex flex-wrap justify-center gap-6">
<a class="text-[10px] uppercase tracking-widest font-semibold text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors underline-offset-4 hover:underline" href="#">Privacy Policy</a>
<a class="text-[10px] uppercase tracking-widest font-semibold text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors underline-offset-4 hover:underline" href="#">Terms of Service</a>
<a class="text-[10px] uppercase tracking-widest font-semibold text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors underline-offset-4 hover:underline" href="#">Security</a>
<a class="text-[10px] uppercase tracking-widest font-semibold text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors underline-offset-4 hover:underline" href="#">Status</a>
</div>
</footer>
</body></html>
