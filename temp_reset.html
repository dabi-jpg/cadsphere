<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopNavBar (Suppressed for focused transactional task as per rules, but included for brand anchor if strictly necessary. Per mandate, login/reset pages should suppress shell. We will keep brand identity minimal.) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-white border-b border-slate-200">
<div class="text-xl font-bold tracking-tighter text-slate-900">
            Blueprint Precision
        </div>
<div class="flex gap-6 items-center">
<a class="font-['Inter'] text-[14px] font-medium tracking-tight text-slate-500 hover:text-blue-700 transition-colors" href="#">Support</a>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 pt-16">
<!-- Central Reset Card -->
<div class="w-full max-w-md bg-surface border border-outline-variant p-8 rounded-lg shadow-sm">
<div class="flex flex-col gap-2 mb-8 text-center md:text-left">
<div class="flex justify-center md:justify-start mb-4">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="lock_reset">lock_reset</span>
</div>
</div>
<h1 class="text-[1.25rem] font-bold text-on-surface tracking-tight">Reset Password</h1>
<p class="text-[0.875rem] text-on-surface-variant">Please enter and confirm your new password.</p>
</div>
<form class="flex flex-col gap-6">
<!-- Input Group: New Password -->
<div class="flex flex-col gap-1.5">
<label class="text-[0.75rem] font-bold uppercase tracking-widest text-on-surface-variant px-1" for="new_password">
                        New Password
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[18px]" data-icon="password">password</span>
</div>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg pl-10 pr-4 py-2.5 text-[0.875rem] focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="new_password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Input Group: Confirm New Password -->
<div class="flex flex-col gap-1.5">
<label class="text-[0.75rem] font-bold uppercase tracking-widest text-on-surface-variant px-1" for="confirm_password">
                        Confirm New Password
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[18px]" data-icon="verified_user">verified_user</span>
</div>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg pl-10 pr-4 py-2.5 text-[0.875rem] focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="mt-2 w-full bg-primary text-on-primary font-semibold py-3 px-4 rounded-lg hover:opacity-90 active:opacity-80 transition-all flex items-center justify-center gap-2" type="submit">
                    Reset Password
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant text-center">
<a class="text-[0.875rem] text-primary font-medium hover:underline flex items-center justify-center gap-1" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="chevron_left">chevron_left</span>
                    Back to login
                </a>
</div>
</div>
</main>
<!-- Visual Technical Elements (Architectural Aesthetic) -->
<div class="fixed bottom-0 left-0 p-6 pointer-events-none opacity-20 hidden md:block">
<div class="border-l border-b border-primary w-24 h-24 relative">
<span class="absolute bottom-1 left-1 text-[8px] font-mono text-primary">SCALE 1:100</span>
</div>
</div>
<div class="fixed top-20 right-0 p-6 pointer-events-none opacity-20 hidden md:block">
<div class="border-r border-t border-primary w-16 h-16 relative">
<span class="absolute top-1 right-1 text-[8px] font-mono text-primary uppercase">Precision Cad v2.4</span>
</div>
</div>
<!-- Footer -->
<footer class="w-full flex flex-col items-center gap-4 text-center px-4 py-8 bg-slate-50 border-t border-slate-200">
<div class="flex gap-6 mb-2">
<a class="font-['Inter'] text-[12px] uppercase tracking-widest text-slate-500 hover:text-blue-600 transition-colors" href="#">Privacy Policy</a>
<a class="font-['Inter'] text-[12px] uppercase tracking-widest text-slate-500 hover:text-blue-600 transition-colors" href="#">Terms of Service</a>
<a class="font-['Inter'] text-[12px] uppercase tracking-widest text-slate-500 hover:text-blue-600 transition-colors" href="#">Security</a>
</div>
<p class="font-['Inter'] text-[12px] uppercase tracking-widest text-slate-400">© 2024 Blueprint Precision CAD Portal. All rights reserved.</p>
</footer>
</body></html>
